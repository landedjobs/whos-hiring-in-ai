<svg width="1200" height="240" viewBox="0 0 1200 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Who's Hiring in AI">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5b29"/>
      <stop offset="1" stop-color="#6C2BD9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5b29" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6C2BD9" stop-opacity="0.10"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6C2BD9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6C2BD9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="240" rx="14" fill="#0d1117"/>
  <rect x="1" y="1" width="1198" height="238" rx="13" fill="none" stroke="#30363d" stroke-width="1"/>
  <circle cx="1050" cy="30" r="220" fill="url(#orb)"/>
  <circle cx="120" cy="230" r="160" fill="url(#orb)"/>
  <g font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif">
    <text x="70" y="88" font-size="20" font-weight="600" letter-spacing="6" fill="#8b949e">LIVE FROM X — REFRESHED EVERY FEW DAYS</text>
    <text x="66" y="150" font-size="54" font-weight="800" fill="#f0f6fc">Who&#8217;s Hiring in <tspan fill="url(#accent)">AI</tspan></text>
    <text x="70" y="192" font-size="22" fill="#8b949e">Real hiring posts by founders &#38; hiring managers — before they hit the job boards.</text>
  </g>
  <rect x="70" y="205" width="180" height="5" rx="2.5" fill="url(#accent)"/>
  <g transform="translate(1020,80)">
    <rect x="0" y="0" width="110" height="110" rx="24" fill="url(#glow)" stroke="#30363d"/>
    <text x="55" y="76" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="56" font-weight="800" fill="#f0f6fc" text-anchor="middle">𝕏</text>
  </g>
</svg>
