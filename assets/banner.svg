<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" role="img" aria-label="Who's Hiring in AI">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1113"/><stop offset="1" stop-color="#0c0708"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="1.12" r="0.72">
      <stop offset="0" stop-color="#ff5b29" stop-opacity="0.32"/>
      <stop offset="0.55" stop-color="#ff5b29" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ff5b29" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="300" rx="20" fill="url(#ink)"/>
  <rect width="1200" height="300" rx="20" fill="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="298" rx="19" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <text x="600" y="86" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="4" fill="#a79c99">LIVE FROM X · SORTED BY ROLE · REFRESHED EVERY FEW DAYS</text>

  <text x="600" y="162" text-anchor="middle" font-size="56" font-weight="800" fill="#ffffff">Who&#8217;s Hiring in <tspan fill="#ff5b29">AI</tspan></text>

  <!-- pixel divider motif (echoes the pixel wordmark) -->
  <g fill="#ff5b29" transform="translate(0,192)">
    <rect x="536" y="0" width="9" height="9" opacity="0.35"/>
    <rect x="550" y="0" width="9" height="9" opacity="0.6"/>
    <rect x="564" y="0" width="9" height="9"/>
    <rect x="578" y="0" width="9" height="9" opacity="0.6"/>
    <rect x="592" y="0" width="9" height="9" opacity="0.35"/>
    <rect x="667" y="0" width="9" height="9" opacity="0.35"/>
    <rect x="653" y="0" width="9" height="9" opacity="0.6"/>
    <rect x="639" y="0" width="9" height="9"/>
    <rect x="625" y="0" width="9" height="9" opacity="0.6"/>
    <rect x="611" y="0" width="9" height="9" opacity="0.35"/>
  </g>

  <text x="600" y="248" text-anchor="middle" font-size="21" fill="#bcb2af">Real hiring posts by founders &#38; hiring managers, before they hit the job boards.</text>
</svg>
